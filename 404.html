<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>页面不存在 | 方雳律师</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --nv: #0f2744; --gd: #b8973a;
  --wh: #fff; --tx: #111; --mt: #555; --bd: #e6e2db;
  --serif: 'Songti SC','STSong','SimSun',serif;
  --sans: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  --pad: clamp(32px,8vw,100px);
  --bg: #ffffff;
  --card-bg: #ffffff;
  --title-c: #0f2744;
  --body-c: #111111;
  --muted-c: #555555;
  --border-c: #e6e2db;
  --num-c: #e6e2db;
  --arr-c: #e6e2db;
}
html.dark {
  --bg: #111111;
  --card-bg: #1a1a1a;
  --title-c: #e8e3dc;
  --body-c: #d4cfc8;
  --muted-c: #8a8680;
  --border-c: #2a2720;
  --num-c: #2a2720;
  --arr-c: #333028;
}
body { font-family: var(--sans); color: var(--body-c); background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--pad); -webkit-font-smoothing: antialiased; transition: background .3s, color .3s; }
main { width: 100%; max-width: 480px; position: relative; }
.num { font-family: var(--serif); font-size: clamp(80px,15vw,120px); font-weight: 300; color: var(--num-c); line-height: 1; margin-bottom: 32px; letter-spacing: -4px; transition: color .3s; }
.num em { font-style: normal; color: var(--gd); }
.title { font-family: var(--serif); font-size: clamp(20px,3vw,26px); font-weight: 300; color: var(--title-c); line-height: 1.5; margin-bottom: 16px; transition: color .3s; }
.desc { font-size: 15px; color: var(--muted-c); line-height: 2.1; font-weight: 300; margin-bottom: 40px; transition: color .3s; }
.links { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--border-c); transition: border-color .3s; }
.link-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border-c); text-decoration: none; color: var(--body-c); transition: color .2s, border-color .3s; }
.link-item:hover { color: var(--title-c); }
.link-label { font-size: 9px; letter-spacing: 3px; color: var(--gd); text-transform: uppercase; font-weight: 400; min-width: 60px; }
.link-text { font-size: 15px; color: inherit; font-weight: 300; flex: 1; padding: 0 16px; }
.link-arr { font-size: 13px; color: var(--arr-c); transition: color .2s; }
.link-item:hover .link-arr { color: var(--title-c); }

/* 夜间切换按钮 */
.theme-btn { position: fixed; top: 20px; right: 20px; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border-c); background: var(--card-bg); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .3s; }
.theme-btn:hover { border-color: var(--gd); }
.theme-btn svg { transition: opacity .3s; }
.icon-sun { position: absolute; }
.icon-moon { position: absolute; }
html:not(.dark) .icon-moon { opacity: 0; }
html.dark .icon-sun { opacity: 0; }

@media (max-width: 680px) {
  :root { --pad: 20px; }
}
</style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()" aria-label="切换夜间模式">
  <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b8973a" stroke-width="1.5">
    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
  <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#b8973a" stroke-width="1.5">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>

<main>
  <div>
    <div class="num">4<em>0</em>4</div>
    <h1 class="title">这个页面不存在</h1>
    <p class="desc">你访问的地址可能已经失效，或者链接有误。以下是一些可以去的地方：</p>
    <div class="links">
      <a class="link-item" href="index.html">
        <span class="link-label">首页</span>
        <span class="link-text">回到主页</span>
        <span class="link-arr">→</span>
      </a>
      <a class="link-item" href="services.html">
        <span class="link-label">服务</span>
        <span class="link-text">了解服务领域</span>
        <span class="link-arr">→</span>
      </a>
      <a class="link-item" href="articles.html">
        <span class="link-label">文章</span>
        <span class="link-text">阅读法律思考</span>
        <span class="link-arr">→</span>
      </a>
      <a class="link-item" href="index.html#p4">
        <span class="link-label">联系</span>
        <span class="link-text">预约咨询</span>
        <span class="link-arr">→</span>
      </a>
    </div>
  </div>
</main>

<script>
function applyTheme(dark) {
  document.documentElement.classList.toggle('dark', dark);
}
function toggleTheme() {
  var isDark = document.documentElement.classList.contains('dark');
  applyTheme(!isDark);
  try { localStorage.setItem('theme', !isDark ? 'dark' : 'light'); } catch(e) {}
}
// 初始化：读取偏好，默认跟随系统
(function() {
  var saved = '';
  try { saved = localStorage.getItem('theme') || ''; } catch(e) {}
  if (saved === 'dark') { applyTheme(true); }
  else if (saved === 'light') { applyTheme(false); }
  else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) { applyTheme(true); }
})();
</script>
</body>
</html>
