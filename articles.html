<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="方雳律师文章：写给企业经营者的法律思考，不谈法条，只谈处境。">
<title>文章 | 方雳律师</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --nv: #0f2744; --nv2: #0a1d33; --gd: #b8973a; --gd-dark: #8a7030;
  --cr: #faf9f6; --wh: #fff; --tx: #111; --mt: #555;
  --bd: #e6e2db; --g1: #f7f5f1;
  --serif: 'Songti SC','STSong','SimSun',serif;
  --sans: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  --pad: clamp(32px,8vw,100px); --maxw: 1080px;
}
html { scroll-behavior: smooth; }
body { font-family: var(--sans); color: var(--tx); background: var(--wh); font-size: 17px; line-height: 2; -webkit-font-smoothing: antialiased; }

nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(255,255,255,.96); backdrop-filter: blur(8px); border-bottom: 1px solid var(--bd); display: flex; align-items: center; justify-content: space-between; padding: 0 var(--pad); height: 64px; }
.nav-brand { font-family: var(--serif); font-size: 14px; letter-spacing: 6px; color: var(--nv); font-weight: 400; text-decoration: none; }
.nav-links { display: flex; gap: 28px; align-items: center; }
.nav-links a { font-size: 11px; letter-spacing: 2px; color: #555; cursor: pointer; transition: color .2s; text-decoration: none; font-weight: 300; }
.nav-links a:hover, .nav-links a.active { color: var(--nv); }
.nav-ham { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
.nav-ham svg { display: block; }

.page-wrap { padding-top: 64px; }
.list-section { max-width: var(--maxw); margin: 0 auto; padding: 80px var(--pad) 96px; }
.section-label { font-size: 9px; letter-spacing: 5px; color: var(--gd-dark); text-transform: uppercase; margin-bottom: 16px; font-weight: 400; }
.section-title { font-family: var(--serif); font-size: clamp(22px,2.5vw,30px); font-weight: 300; color: var(--nv); line-height: 1.5; margin-bottom: 16px; }
.list-desc { font-size: 16px; color: var(--mt); font-weight: 300; line-height: 2.2; max-width: 560px; }

.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 36px; }
.filter-btn { font-size: 11px; letter-spacing: 2px; color: var(--mt); border: 1px solid var(--bd); padding: 7px 18px; cursor: pointer; transition: all .2s; background: var(--wh); font-family: inherit; }
.filter-btn:hover { border-color: var(--nv); color: var(--nv); }
.filter-btn.active { background: var(--nv); color: var(--wh); border-color: var(--nv); }

.art-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(300px,1fr)); gap: 1px; background: var(--bd); border: 1px solid var(--bd); margin-top: 28px; }
.art-card { background: var(--wh); padding: 32px 28px; cursor: pointer; transition: background .2s; display: flex; flex-direction: column; }
.art-card:hover { background: var(--cr); }
.art-tag { font-size: 9px; letter-spacing: 4px; color: var(--gd-dark); text-transform: uppercase; font-weight: 400; margin-bottom: 16px; }
.art-title { font-family: var(--serif); font-size: 18px; font-weight: 400; color: var(--nv); line-height: 1.6; margin-bottom: 14px; flex: 1; }
.art-desc { font-size: 15px; color: var(--mt); line-height: 1.9; font-weight: 300; }
.art-date { font-size: 11px; color: #aaa; margin-top: 20px; font-weight: 300; letter-spacing: 1px; }
.no-result { padding: 56px 0; font-size: 14px; color: var(--bd); letter-spacing: 1px; display: none; }

.art-body-wrap { display: none; }
.art-inner { max-width: var(--maxw); margin: 0 auto; padding: 64px var(--pad) 96px; }
.art-nav-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px; flex-wrap: wrap; gap: 16px; }
.back-btn { font-size: 11px; letter-spacing: 3px; color: var(--mt); cursor: pointer; transition: color .2s; font-weight: 300; }
.back-btn:hover { color: var(--nv); }
.share-btn { display: flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 2px; color: var(--mt); cursor: pointer; transition: color .2s; border: 1px solid var(--bd); padding: 7px 16px; font-family: inherit; background: none; }
.share-btn:hover { color: var(--nv); border-color: var(--nv); }
.share-toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--nv); color: var(--wh); font-size: 13px; letter-spacing: 1px; padding: 12px 24px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
.share-toast.show { opacity: 1; }

.art-content { max-width: 100%; }
.art-eyebrow { font-size: 9px; letter-spacing: 4px; color: var(--gd-dark); text-transform: uppercase; font-weight: 400; margin-bottom: 20px; }
.art-content h1 { font-family: var(--serif); font-size: clamp(24px,3vw,36px); font-weight: 300; color: var(--nv); line-height: 1.4; margin-bottom: 20px; }
.art-meta { font-size: 12px; color: #aaa; letter-spacing: 2px; font-weight: 300; margin-bottom: 48px; border-bottom: 1px solid var(--bd); padding-bottom: 24px; }
.art-content h3 { font-family: var(--serif); font-size: 18px; font-weight: 500; color: var(--nv); margin: 40px 0 16px; line-height: 1.5; }
.art-content p { font-size: 17px; color: var(--tx); line-height: 2.1; margin-bottom: 20px; font-weight: 300; text-align: justify; }
.tip { background: var(--g1); border-left: 2px solid var(--gd); padding: 16px 20px; margin: 32px 0; font-size: 16px; color: var(--mt); line-height: 2; font-weight: 300; }

.cta-wrap { margin-top: 56px; padding-top: 32px; border-top: 1px solid var(--bd); display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 24px; }
.cta-label { font-size: 9px; letter-spacing: 4px; color: var(--gd-dark); text-transform: uppercase; font-weight: 400; margin-bottom: 8px; }
.cta-left p { font-size: 15px; color: var(--mt); line-height: 1.9; font-weight: 300; }
.cta-right { display: flex; gap: 12px; flex-wrap: wrap; }
.btn { display: inline-block; cursor: pointer; font-size: 11px; letter-spacing: 3px; padding: 12px 24px; transition: all .25s; font-family: inherit; border: 1px solid var(--nv); text-decoration: none; }
.btn-p { background: var(--nv); color: var(--wh); }
.btn-p:hover { background: var(--nv2); }
.btn-g { background: transparent; color: var(--nv); }
.btn-g:hover { background: var(--nv); color: var(--wh); }
.qr-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: center; justify-content: center; }
.qr-overlay.show { display: flex; }
.qr-box { background: var(--wh); padding: 40px; text-align: center; max-width: 320px; }
.qr-box img { width: 200px; height: 200px; display: block; margin: 0 auto 16px; }
.qr-box p { font-size: 14px; color: var(--mt); margin-bottom: 16px; font-weight: 300; }
.qr-close { font-size: 11px; letter-spacing: 2px; color: var(--mt); cursor: pointer; border: none; background: none; font-family: inherit; }

.art-pager { margin-top: 64px; padding-top: 32px; border-top: 1px solid var(--bd); display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--bd); border: 1px solid var(--bd); }
.pager-item { background: var(--wh); padding: 24px 28px; cursor: pointer; transition: background .2s; }
.pager-item:hover { background: var(--cr); }
.pager-item.disabled { opacity: .3; cursor: default; pointer-events: none; }
.pager-item.next { text-align: right; }
.pager-dir { font-size: 9px; letter-spacing: 3px; color: var(--gd-dark); text-transform: uppercase; margin-bottom: 8px; font-weight: 400; }
.pager-title { font-family: var(--serif); font-size: 15px; color: var(--nv); line-height: 1.5; font-weight: 400; }

footer { text-align: center; padding: 36px var(--pad); font-size: 12px; color: #888; border-top: 1px solid var(--bd); letter-spacing: 3px; font-weight: 300; }

@media (max-width: 1024px) { :root { --pad: clamp(24px,5vw,60px); } }
@media (max-width: 680px) {
  :root { --pad: 20px; }
  nav { height: 56px; padding: 0 20px; }
  .nav-brand { font-size: 13px; letter-spacing: 4px; }
  .nav-ham { display: block; }
  .nav-links { display: none; position: absolute; top: 56px; left: 0; right: 0; background: rgba(255,255,255,.98); backdrop-filter: blur(8px); flex-direction: column; gap: 0; border-bottom: 1px solid var(--bd); z-index: 101; }
  .nav-links.open { display: flex; }
  .nav-links a { font-size: 13px; letter-spacing: 2px; padding: 16px 20px; border-top: 1px solid var(--bd); }
  .page-wrap { padding-top: 56px; }
  .list-section { padding: 56px 20px 72px; }
  .art-grid { grid-template-columns: 1fr; }
  .art-inner { padding: 48px 20px 72px; }
  .cta-wrap { flex-direction: column; }
  .art-pager { grid-template-columns: 1fr; }
  .pager-item.next { text-align: left; }
}
</style>
</head>

  <a class="nav-brand" href="index.html">方 · 雳</a>
  <div class="nav-links" id="nav-menu">

    <a href="index.html#p2">服务领域</a>

    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

</nav>

  <div class="list-section">

<script>
(function(){
  var s = document.createElement('script');
  s.src = 'articles-data.js?t=' + Date.now();
  s.onload = function() { renderFilter(); renderGrid(); };
  document.head.appendChild(s);

</script>
<script>
var currentTag = '全部';
var currentId = null;

function getTags() {
  var tags = ['全部'];
  ARTICLES.forEach(function(a) {
    if (tags.indexOf(a.tag) === -1) tags.push(a.tag);
  });
  return tags;
}

function renderFilter() {
  document.getElementById('filter-bar').innerHTML = getTags().map(function(t) {
    return '<button class="filter-btn' + (t === currentTag ? ' active' : '') + '" onclick="setTag(\'' + t + '\')">' + t + '</button>';
  }).join('');
}

function setTag(tag) {
  currentTag = tag;
  renderFilter();
  renderGrid();
}

function renderGrid() {
  var list = ARTICLES.filter(function(a) {
    return currentTag === '全部' || a.tag === currentTag;
  });
  var grid = document.getElementById('art-grid');
  var empty = document.getElementById('no-result');
  if (!list.length) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.style.display = 'grid';
  grid.innerHTML = list.map(function(a) {
    return '<div class="art-card" onclick="showArt(\'' + a.id + '\')">'
      + '<div class="art-tag">' + a.tag + '</div>'
      + '<div class="art-title">' + a.title + '</div>'
      + '<div class="art-desc">' + a.desc + '</div>'
      + '<div class="art-date">' + a.date + '</div>'
      + '</div>';
  }).join('');
}

function showArt(id) {
  var a = ARTICLES.find(function(x) { return x.id === id; });
  if (!a) return;
  currentId = id;
  document.getElementById('art-content-body').innerHTML =
    '<div class="art-eyebrow">' + a.tag + '</div>'
    + '<h1>' + a.title + '</h1>'
    + '<p class="art-meta">' + a.date + '</p>'
    + a.content;
  var idx = ARTICLES.findIndex(function(x) { return x.id === id; });
  var prev = ARTICLES[idx - 1];
  var next = ARTICLES[idx + 1];
  document.getElementById('art-pager').innerHTML =
    '<div class="pager-item' + (prev ? '' : ' disabled') + '"' + (prev ? ' onclick="showArt(\'' + prev.id + '\')"' : '') + '>'
    + '<div class="pager-dir">← 上一篇</div>'
    + '<div class="pager-title">' + (prev ? prev.title : '已是第一篇') + '</div>'
    + '</div>'
    + '<div class="pager-item next' + (next ? '' : ' disabled') + '"' + (next ? ' onclick="showArt(\'' + next.id + '\')"' : '') + '>'
    + '<div class="pager-dir">下一篇 →</div>'
    + '<div class="pager-title">' + (next ? next.title : '已是最后一篇') + '</div>'
    + '</div>';
  document.getElementById('art-list').style.display = 'none';
  document.getElementById('art-body').style.display = 'block';
  window.scrollTo({ top: 0 });
}

function showList() {
  document.getElementById('art-list').style.display = 'block';
  document.getElementById('art-body').style.display = 'none';
  currentId = null;
  window.scrollTo({ top: 0 });
}

function shareArt() {
  var a = ARTICLES.find(function(x) { return x.id === currentId; });
  var text = a ? a.title + ' — 方雳律师' : '方雳律师';
  var url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: text, url: url });
  } else {
    try { navigator.clipboard.writeText(url); } catch(e) {
      var ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
    }
    var toast = document.getElementById('share-toast');
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 2000);
  }
}

// 初始化由动态加载的 onload 触发，无需在此调用

// 处理从主页跳转过来的 ?id=aX 参数
(function(){
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  if (id) {
    var wait = setInterval(function(){
      if (typeof ARTICLES !== 'undefined') {
        clearInterval(wait);
        showArt(id);
      }
    }, 50);
  }
})();
</script>
</body>
