*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {

html { scroll-behavior: smooth; }

.page-wrap { padding-top: 64px; }
.list-section { max-width: var(--maxw); margin: 0 auto; padding: 80px var(--pad) 96px; }
.section-label { font-size: 9px; letter-spacing: 5px; color: var(--gd-dark); text-transform: uppercase; margin-bottom: 16px; font-weight: 400; }

.list-desc { font-size: 16px; color: var(--mt); font-weight: 300; line-height: 2.2; max-width: 560px; }

.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 36px; }
.filter-btn { font-size: 11px; letter-spacing: 2px; color: var(--mt); border: 1px solid var(--bd); padding: 7px 18px; cursor: pointer; transition: all .2s; background: var(--wh); font-family: inherit; }

.no-result { padding: 56px 0; font-size: 14px; color: var(--bd); letter-spacing: 1px; display: none; }

.art-body-wrap { display: none; }
.art-inner { max-width: 1200px; margin: 0 auto; padding: 64px var(--pad) 96px; display: grid; grid-template-columns: 1fr 200px; gap: 64px; align-items: start; }
.art-main { min-width: 0; }
.art-side { position: sticky; top: 88px; display: flex; flex-direction: column; gap: 0; }

.art-content { max-width: 100%; }

.pager-item:last-child { border-bottom: none; }

.pager-title { font-family: var(--serif); font-size: 13px; color: var(--nv); line-height: 1.6; font-weight: 400; }

.font-ctrl { margin-bottom: 16px; border: 1px solid var(--bd); display: flex; overflow: hidden; }

footer { text-align: center; padding: 36px var(--pad); font-size: 12px; color: #888; border-top: 1px solid var(--bd); letter-spacing: 3px; font-weight: 300; }

<script>
var currentTag = '全部';
var currentId = null;

function getTags() {
  var tags = ['全部'];
  ARTICLES.forEach(function(a) {
    if (tags.indexOf(a.tag) === -1) tags.push(a.tag);
  });
  return tags;
}

function renderFilter() {
  document.getElementById('filter-bar').innerHTML = getTags().map(function(t) {
    return '<button class="filter-btn' + (t === currentTag ? ' active' : '') + '" onclick="setTag(\'' + t + '\')">' + t + '</button>';
  }).join('');
}

function setTag(tag) {
  currentTag = tag;
  renderFilter();
  renderGrid();
}

function renderGrid() {
  var list = ARTICLES.filter(function(a) {
    return currentTag === '全部' || a.tag === currentTag;
  });
  var grid = document.getElementById('art-grid');
  var empty = document.getElementById('no-result');
  if (!list.length) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.style.display = 'grid';
  grid.innerHTML = list.map(function(a) {
    return '<div class="art-card" onclick="showArt(\'' + a.id + '\')">'
      + '<div class="art-tag">' + a.tag + '</div>'
      + '<div class="art-title">' + a.title + '</div>'
      + '<div class="art-desc">' + a.desc + '</div>'
      + '<div class="art-date">' + a.date + '</div>'
      + '</div>';
  }).join('');
}

function showArt(id) {
  var a = ARTICLES.find(function(x) { return x.id === id; });
  if (!a) return;
  currentId = id;
  document.getElementById('art-content-body').innerHTML =
    '<div class="art-eyebrow">' + a.tag + '</div>'
    + '<h1>' + a.title + '</h1>'
    + '<div class="art-meta"><span>' + a.date + '</span><button class="share-btn" onclick="shareArt()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>分享</button></div>'
    + a.content;
  var idx = ARTICLES.findIndex(function(x) { return x.id === id; });
  var prev = ARTICLES[idx - 1];
  var next = ARTICLES[idx + 1];
  document.getElementById('art-pager').innerHTML =
    '<div class="pager-item' + (prev ? '' : ' disabled') + '"' + (prev ? ' onclick="showArt(\'' + prev.id + '\')"' : '') + '>'
    + '<div class="pager-dir">↑ 上一篇</div>'
    + '<div class="pager-title">' + (prev ? prev.title : '已是第一篇') + '</div>'
    + '</div>'
    + '<div class="pager-item' + (next ? '' : ' disabled') + '"' + (next ? ' onclick="showArt(\'' + next.id + '\')"' : '') + '>'
    + '<div class="pager-dir">↓ 下一篇</div>'
    + '<div class="pager-title">' + (next ? next.title : '已是最后一篇') + '</div>'
    + '</div>';
  document.getElementById('art-list').style.display = 'none';
  document.getElementById('art-body').style.display = 'block';
  window.scrollTo({ top: 0 });
  loadFontSize();
  try { history.pushState(null, '', 'articles.html?id=' + id); } catch(e) {}
}

function showList() {
  document.getElementById('art-list').style.display = 'block';
  document.getElementById('art-body').style.display = 'none';
  currentId = null;
  window.scrollTo({ top: 0 });
  try { history.pushState(null, '', 'articles.html'); } catch(e) {}
}
window.addEventListener('popstate', function() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  if (id && typeof ARTICLES !== 'undefined') { showArt(id); }
  else { showList(); }
});

function shareArt() {
  var a = ARTICLES.find(function(x) { return x.id === currentId; });
  var text = a ? a.title + ' — 方雳律师' : '方雳律师';
  var url = window.location.origin + window.location.pathname + '?id=' + currentId;
  if (navigator.share) {
    try { navigator.share({ title: text, url: url }).catch(function(){}); } catch(e) {}
    return;
  }
  // 复制链接
  try {
    navigator.clipboard.writeText(url).then(function() {
      showToast();
    }).catch(function() {
      fallbackCopy(url);
    });
  } catch(e) {
    fallbackCopy(url);
  }
}
function fallbackCopy(url) {
  var ta = document.createElement('textarea');
  ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  showToast();
}
function showToast() {
  var toast = document.getElementById('share-toast');
  if (!toast) return;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 2000);
}

// 初始化由动态加载的 onload 触发，无需在此调用

// 处理从主页跳转过来的 ?id=aX 参数
(function(){
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  if (id) {
    var wait = setInterval(function(){
      if (typeof ARTICLES !== 'undefined') {
        clearInterval(wait);
        showArt(id);
      }
    }, 50);
  }
})();
</script>

<script>
// 字号控制
var BASE_SIZE = 17;
var MIN_SIZE = 14;
var MAX_SIZE = 22;
function applyFontSize(size) {
  document.querySelectorAll('.art-content p, .art-content h3').forEach(function(el) {
    el.style.fontSize = size + 'px';
  });
}
function changeFontSize(delta) {
  var cur = parseInt(localStorage.getItem('art-font-size') || BASE_SIZE);
  var next = Math.min(MAX_SIZE, Math.max(MIN_SIZE, cur + delta));
  localStorage.setItem('art-font-size', next);
  applyFontSize(next);
}
function resetFontSize() {
  localStorage.removeItem('art-font-size');
  applyFontSize(BASE_SIZE);
}
function loadFontSize() {
  var saved = parseInt(localStorage.getItem('art-font-size') || BASE_SIZE);
  applyFontSize(saved);
}

function toggleTheme() {
  var isDark = document.documentElement.classList.contains('dark');
  document.documentElement.classList.toggle('dark', !isDark);
  try { localStorage.setItem('theme', !isDark ? 'dark' : 'light'); } catch(e) {}
}
(function() {
  var saved = '';
  try { saved = localStorage.getItem('theme') || ''; } catch(e) {}
  if (saved === 'dark') { document.documentElement.classList.add('dark'); }
  else if (saved !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) { document.documentElement.classList.add('dark'); }
})();
</script>
